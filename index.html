<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLAG AI - SMART RECOGNITION</title>
    <style>
        :root {
            --neon: #00f2fe; --deep-blue: #020617;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(0, 242, 254, 0.3);
        }
        body {
            background-color: var(--deep-blue); color: white; margin: 0; padding: 10px;
            font-family: 'Lexend', sans-serif; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden; user-select: none;
        }
        .main-card {
            width: 100%; max-width: 500px; background: var(--glass-bg);
            backdrop-filter: blur(20px); border-radius: 35px; border: 1px solid var(--border-color);
            padding-bottom: 30px; box-shadow: 0 0 50px rgba(0, 242, 254, 0.1);
            margin-top: 20px; position: relative;
        }
        .header {
            padding: 35px 20px; text-align: center;
            background: linear-gradient(180deg, rgba(0, 242, 254, 0.1), transparent);
            border-radius: 35px 35px 0 0;
        }
        .header h1 { margin: 0; font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; color: #fff; }

        /* Khung quét nhận diện */
        .scanner-box {
            position: relative; width: 150px; height: 150px; margin: 20px auto;
            border: 2px solid var(--border-color); border-radius: 20px; overflow: hidden;
            display: none;
        }
        .scanner-line {
            position: absolute; width: 100%; height: 3px; background: var(--neon);
            box-shadow: 0 0 15px var(--neon); animation: scanLoop 1.5s infinite;
        }
        @keyframes scanLoop { 0% { top: 0; } 100% { top: 100%; } }

        /* Input Section */
        .search-area { padding: 0 30px; }
        .ai-input {
            width: 100%; padding: 20px; background: rgba(0,0,0,0.6);
            border: 1px solid var(--border-color); border-radius: 15px;
            color: var(--neon); font-size: 1.1rem; text-align: center; outline: none;
        }

        /* Result Panel */
        #result-panel { display: none; padding: 20px 30px; animation: fadeInUp 0.5s ease; }
        .info-tag {
            background: rgba(0, 242, 254, 0.1); padding: 10px; border-radius: 12px;
            margin-bottom: 20px; font-size: 0.8rem; text-align: center; border: 1px solid var(--border-color);
        }

        .sensi-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .sensi-item span:last-child { font-size: 1.4rem; font-weight: 800; color: var(--neon); }
        
        .fire-button {
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            padding: 22px; border-radius: 18px; text-align: center;
            font-weight: 900; font-size: 1.3rem; margin-top: 20px;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .footer { text-align: center; font-size: 0.65rem; color: #475569; margin-top: 30px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="main-card">
    <div class="header">
        <h1 id="title">KLAG RECOGNITION</h1>
        <p style="font-size: 0.7rem; opacity: 0.6;">AI IDENTIFICATION SYSTEM v8.0</p>
    </div>

    <div class="search-area">
        <input type="text" id="userInput" class="ai-input" placeholder="NHẬP TÊN MÁY..." oninput="startRecognition()">
    </div>

    <div class="scanner-box" id="scanner">
        <div class="scanner-line"></div>
        <div style="position: absolute; width: 100%; top: 40%; text-align: center; font-size: 0.6rem; opacity: 0.5;">IDENTIFYING...</div>
    </div>

    <div id="result-panel">
        <div class="info-tag" id="chip-detect">PHÁT HIỆN: CHIPSET TIÊU CHUẨN</div>
        
        <div class="sensi-item"><span>NHÌN XUNG QUANH</span><span id="s1">0</span></div>
        <div class="sensi-item"><span>RED DOT SIGHT</span><span id="s2">0</span></div>
        <div class="sensi-item"><span>SCOPE 2X/4X</span><span id="s3">0</span></div>
        
        <div class="sensi-item" style="border-bottom:none">
            <span style="color: #fbbf24;">DPI ĐỀ XUẤT</span>
            <span id="sdpi" style="color: #fbbf24;">--</span>
        </div>

        <div class="fire-button" id="sfire">NÚT BẮN: --%</div>
    </div>
</div>

<div class="footer">
    MANAGED BY GEMINI AI & ADMIN KLAG<br>
    © 2026 KLAG GLOBAL SECURITY
</div>

<script>
let scanTimeout;

function startRecognition() {
    const input = document.getElementById("userInput").value;
    const scanner = document.getElementById("scanner");
    const panel = document.getElementById("result-panel");

    if(input.length < 2) {
        scanner.style.display = "none";
        panel.style.display = "none";
        return;
    }

    // Hiệu ứng "đang nhận diện"
    panel.style.display = "none";
    scanner.style.display = "block";

    clearTimeout(scanTimeout);
    scanTimeout = setTimeout(() => {
        executeAI(input.toLowerCase());
    }, 1500);
}

function executeAI(q) {
    document.getElementById("scanner").style.display = "none";
    document.getElementById("result-panel").style.display = "block";

    let base = 94, dpi = 411, chip = "STANDARD ARM PROCESSOR";

    // Nhận diện thông minh
    if(q.includes("iphone") || q.includes("ios")) {
        base = 98; dpi = "DEFAULT"; chip = "APPLE A-SERIES BIONIC (NEURAL)";
    } else if(q.includes("a56") || q.includes("samsung")) {
        base = 96; dpi = 450; chip = "EXYNOS 1580 OCTA-CORE (2026)";
    } else if(q.includes("8 gen") || q.includes("elite")) {
        base = 100; dpi = 560; chip = "SNAPDRAGON 8 ELITE (ULTRA)";
    }

    document.getElementById("chip-detect").innerText = "ĐÃ NHẬN DIỆN: " + chip;
    document.getElementById("s1").innerText = base;
    document.getElementById("s2").innerText = base - 5;
    document.getElementById("s3").innerText = base - 12;
    document.getElementById("sdpi").innerText = dpi;
    document.getElementById("sfire").innerText = "NÚT BẮN: " + (43 + Math.floor(Math.random() * 8)) + "%";
}

// BẢO MẬT: CHỐNG COI CODE CAO CẤP
document.onkeydown = (e) => {
    if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0))) || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) {
        alert("KLAG AI: Truy cập bị từ chối. Hệ thống đã được mã hóa!");
        return false;
    }
};
setInterval(() => { (function(){}.constructor("debugger")()) }, 500);
</script>

</body>
</html>
