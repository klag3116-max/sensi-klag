<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLAG AI V4 ULTIMATE</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Segoe UI;
    color:white;
    background: linear-gradient(-45deg,#020617,#020617,#0f172a,#020617);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    background:rgba(15,23,42,0.75);
    backdrop-filter:blur(25px);
    border-radius:25px;
    padding:20px;
    width:360px;
    text-align:center;
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 0 50px rgba(59,130,246,0.3);
}

h2{
    margin:0;
    font-size:18px;
    background:linear-gradient(90deg,#3b82f6,#22c55e);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.status{
    font-size:12px;
    color:#38bdf8;
    margin:6px 0;
}

/* scan text */
.scan{
    font-size:12px;
    color:#22c55e;
    height:16px;
    position:relative;
    overflow:hidden;
}

.scan::after{
    content:"AI SCANNING DEVICE...";
    position:absolute;
    width:100%;
    animation:scanText 2s steps(20) infinite;
}

@keyframes scanText{
    from{clip-path:inset(0 100% 0 0);}
    to{clip-path:inset(0 0 0 0);}
}

select,input{
    width:100%;
    padding:12px;
    margin:6px 0;
    border-radius:12px;
    border:none;
    background:rgba(255,255,255,0.05);
    color:white;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:6px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(90deg,#3b82f6,#22c55e);
    color:white;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #3b82f6;
}

.loading{
    height:4px;
    width:100%;
    background:rgba(255,255,255,0.1);
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
    display:none;
}

.loading div{
    height:100%;
    width:0%;
    background:#22c55e;
    animation:load 2s linear forwards;
}

@keyframes load{
    from{width:0%;}
    to{width:100%;}
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:10px;
}

.box{
    background:rgba(255,255,255,0.05);
    padding:10px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
    transition:0.3s;
}

.box:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #22c55e;
}

@keyframes fade{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">
    <h2>KLAG AI V4 ULTIMATE</h2>

    <div class="scan"></div>
    <div id="info" class="status">Đang phân tích...</div>

    <select id="style">
        <option value="normal">Bình thường</option>
        <option value="fast">Lia nhanh</option>
        <option value="slow">Kéo chậm</option>
    </select>

    <input type="number" id="fps" placeholder="FPS (auto nếu trống)">

    <input type="range" min="-10" max="10" value="0" id="tune">

    <button onclick="analyze()">PHÂN TÍCH AI</button>
    <button onclick="runFPSTest()">TEST FPS</button>

    <div class="loading" id="loadingBar"><div></div></div>
    <div id="fpsResult" class="status"></div>

    <div id="result" style="display:none;">
        <div class="grid">
            <div class="box">Xung quanh: <b id="v1"></b></div>
            <div class="box">Red dot: <b id="v2"></b></div>
            <div class="box">2x: <b id="v3"></b></div>
            <div class="box">4x: <b id="v4"></b></div>
            <div class="box">Sniper: <b id="v5"></b></div>
            <div class="box">Free look: <b id="v6"></b></div>
        </div>
    </div>
</div>

<script>

// detect power
function detectPower(){
    let ram = navigator.deviceMemory || 4;
    let cores = navigator.hardwareConcurrency || 4;
    let score = ram * 2 + cores;

    if(score >= 16) return "high";
    if(score >= 10) return "mid";
    return "low";
}

let devicePower = detectPower();

document.getElementById("info").innerText =
"RAM: " + (navigator.deviceMemory || "?") +
"GB | CPU: " + (navigator.hardwareConcurrency || "?") +
" | Level: " + devicePower.toUpperCase();

// FPS test
function runFPSTest(){
    let start = performance.now();
    let frames = 0;

    function loop(){
        frames++;
        if(performance.now() - start < 1000){
            requestAnimationFrame(loop);
        } else {
            document.getElementById("fpsResult").innerText =
            "FPS: " + frames;
            document.getElementById("fps").value = frames;
        }
    }
    loop();
}

// analyze
function analyze(){
    let load = document.getElementById("loadingBar");
    let result = document.getElementById("result");

    load.style.display = "block";
    result.style.display = "none";

    setTimeout(()=>{

        let style = document.getElementById("style").value;
        let fps = parseInt(document.getElementById("fps").value) || 60;
        let tune = parseInt(document.getElementById("tune").value);

        let s;

        if(devicePower==="low") s=[195,190,185,180,140,180];
        else if(devicePower==="mid") s=[185,180,175,170,130,170];
        else s=[175,170,165,160,120,160];

        if(style==="fast") s=s.map(v=>v+5);
        if(style==="slow") s=s.map(v=>v-5);

        if(fps>=90) s=s.map(v=>v-5);
        if(fps<=40) s=s.map(v=>v+5);

        s=s.map(v=>v+tune);
        s=s.map(v=>Math.max(0,Math.min(200,v)));

        localStorage.setItem("sens", JSON.stringify(s));

        for(let i=1;i<=6;i++){
            document.getElementById("v"+i).innerText=s[i-1];
        }

        load.style.display = "none";
        result.style.display = "block";
        result.style.animation = "fade 0.5s ease";

    },2000);
}

// load saved
let saved = localStorage.getItem("sens");
if(saved){
    let s = JSON.parse(saved);
    for(let i=1;i<=6;i++){
        document.getElementById("v"+i).innerText=s[i-1];
    }
    document.getElementById("result").style.display="block";
}

</script>

</body>
</html>
